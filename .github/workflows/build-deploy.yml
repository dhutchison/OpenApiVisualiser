# This is a basic workflow to help you get started with Actions

name: Build, Test and Deploy

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  push:
    branches: [ master ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

env:
  NODE_VERSION: '24'

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:

  build-test:
    # The type of runner that the job will run on
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      pages: write
      id-token: write
    outputs:
      release_created: ${{ steps.release_version.outputs.release_created }}
      version: ${{ steps.release_version.outputs.version }}

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
    - name: Checkout 🛎️
      uses: actions/checkout@v6
      with:
        # Shallow clones should be disabled for a better relevancy of sonar analysis
        fetch-depth: 0
    # This installs node and npm for us
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    - uses: actions/setup-python@v6
      with:
        python-version: '3.x'
    - name: Install Commitizen
      run: python3 -m pip install commitizen
    - name: Bump version from conventional commits
      id: release_version
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git fetch --tags

        set +e
        VERSION=$(cz bump --get-next 2>commitizen-bump.err)
        STATUS=$?
        set -e

        if [ "${STATUS}" -ne 0 ]; then
          cat commitizen-bump.err
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "release_created=false" >> "${GITHUB_OUTPUT}"
          echo "version=${CURRENT_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "No conventional commits requiring a release were found."
          exit 0
        fi

        cz bump --version-files-only --yes

        PACKAGE_VERSION=$(node -p "require('./package.json').version")
        if [ "${PACKAGE_VERSION}" != "${VERSION}" ]; then
          echo "Commitizen calculated ${VERSION}, but package.json contains ${PACKAGE_VERSION}."
          exit 1
        fi

        echo "release_created=true" >> "${GITHUB_OUTPUT}"
        echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

        BOT_ID=$(gh api /users/github-actions%5Bbot%5D --jq .id)
        BOT_EMAIL="${BOT_ID}+github-actions[bot]@users.noreply.github.com"

        git config user.name "github-actions[bot]"
        git config user.email "${BOT_EMAIL}"
        git add package.json package-lock.json
        git commit -m "chore(release): v${VERSION}"
        git push origin HEAD:${{ github.ref_name }}
    - name: Setup Pages
      id: pages
      uses: actions/configure-pages@v6
    # Lint and Build
    - name: Install, Lint and Build 🔧
      run: |
        npm ci
        npm run-script lint
        npm run-script build-deployment
    # Run tests
    - name: Test
      run: |
        npm run-script test:all
    # Code quality checks
    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
      env:
        # Needed to get PR information, if any
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    - name: Upload artifact
      # Automatically uploads an artifact from the './_site' directory by default
      uses: actions/upload-pages-artifact@v5
      with:
        path: dist

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Tag repository version
        if: needs.build-test.outputs.release_created == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.build-test.outputs.version }}"
          TAG_NAME="v${VERSION}"
          BOT_ID=$(gh api /users/github-actions%5Bbot%5D --jq .id)
          BOT_EMAIL="${BOT_ID}+github-actions[bot]@users.noreply.github.com"

          git fetch --tags

          if git rev-parse "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} already exists; skipping tag creation."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "${BOT_EMAIL}"
          git tag -a "${TAG_NAME}" -m "Release ${TAG_NAME}"
          git push origin "${TAG_NAME}"
