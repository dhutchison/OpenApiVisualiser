<div class="api-path-tree-layout" #pathTreeLayout [style.min-height.px]="pathTreeMinHeight">
  <div class="path-tree-buttons">
    <p-selectButton
      [options]="viewTypes"
      [(ngModel)]="horizontalView"
      optionLabel="title"
      optionValue="value">
    </p-selectButton>

    <p-selectButton
      [options]="expansionTypes"
      [(ngModel)]="joinNodesWithNoLeaves"
      optionLabel="title"
      optionValue="value">
    </p-selectButton>

    <button pButton type="button" icon="pi pi-download" label="Download Image"
      (click)="downloadImage($event)"
      class="download-image-button"
      [disabled]="generatingImage" *ngIf="horizontalView">
    </button>
  </div>

  <div>
    <div class="tree-view" #treeView>
      <p-tree [value]="apiPathNodes"
          (onNodeSelect)="openEndpointDetail($event)"
          [styleClass]="horizontalView? 'tree-horizontal': 'tree-vertical'">

        <ng-template let-node pTemplate="operation">
          <button
            type="button"
            class="operation-node"
            pTooltip="{{ node.tooltip }}"
            [escape]=false
            id="{{ node.id }}-node"
            (click)="openEndpointDetail(node)">{{ node.label }}</button>
        </ng-template>
      </p-tree>
    </div>
  </div>
</div>

<p-dialog
  *ngIf="endpointDialogVisible && selectedOperationNode"
  header="{{ selectedOperationNode?.method }} {{ selectedOperationNode?.path }}"
  [(visible)]="endpointDialogVisible"
  [modal]="true"
  [draggable]="false"
  [resizable]="true"
  [style]="{width: '90vw'}"
  [contentStyle]="{'max-height': '80vh', overflow: 'auto'}">
  <ng-template pTemplate="content">
    <app-endpoint-swagger
      [apiSpec]="selectedOperationNode.apiDefinition"
      [path]="selectedOperationNode.path"
      [method]="selectedOperationNode.method"
      [operation]="selectedOperationNode.operation">
    </app-endpoint-swagger>
  </ng-template>
</p-dialog>
