
<div *ngIf="schemas">
  <h3>Schemas</h3>
  <p-accordion [multiple]="true">
      <p-accordion-panel
      *ngFor="let item of items"
      [value]="item">
        <p-accordion-header>{{item}}</p-accordion-header>
        <p-accordion-content>
        <app-schema-detail 
          id="components_schemas_{{item}}"
          [apiSpec]="apiSpec"
          [schema]="schemas[item]"></app-schema-detail>
        </p-accordion-content>
      </p-accordion-panel>
  </p-accordion>
</div>
