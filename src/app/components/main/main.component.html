<div>
  <div class="button-bar">
    <app-file-chooser></app-file-chooser>
    <app-url-chooser></app-url-chooser>
    <app-export></app-export>
  </div>
  <p-accordion [(value)]="activePanels" [multiple]="true">
    <p-accordion-panel value="0">
      <p-accordion-header id="api-information-tab">API Information</p-accordion-header>
      <p-accordion-content>
      <app-api-information></app-api-information>
      </p-accordion-content>
    </p-accordion-panel>
    <p-accordion-panel value="1">
      <p-accordion-header id="summary-tab">Summary</p-accordion-header>
      <p-accordion-content>
      <app-summary></app-summary>
      </p-accordion-content>
    </p-accordion-panel>
    <p-accordion-panel value="2">
      <p-accordion-header id="api-path-tab">API Paths</p-accordion-header>
      <p-accordion-content>
      <app-api-path-tree></app-api-path-tree>
      </p-accordion-content>
    </p-accordion-panel>
    <p-accordion-panel value="3">
      <p-accordion-header id="tags-tab">Tags</p-accordion-header>
      <p-accordion-content>
      <app-api-tags></app-api-tags>
      </p-accordion-content>
    </p-accordion-panel>
    <p-accordion-panel value="4">
      <p-accordion-header id="components-tab">Components</p-accordion-header>
      <p-accordion-content>
        <app-api-components-detail></app-api-components-detail>
      </p-accordion-content>
    </p-accordion-panel>
  </p-accordion>
</div>
